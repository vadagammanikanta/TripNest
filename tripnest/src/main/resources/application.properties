spring.application.name=tripnest

# ==============================
# Database Configuration (MySQL)
# ==============================
spring.datasource.url=jdbc:mysql://localhost:3306/tripnest_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ==============================
# JPA / Hibernate
# ==============================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect

# ==============================
# JWT Configuration
# ==============================
tripnest.app.jwtSecret=TripNestSecretKey2024VeryLongSecretKeyForJWTSigningThatMustBeAtLeast256BitsLong
tripnest.app.jwtExpirationMs=86400000
tripnest.app.jwtCookieName=tripnest

# ==============================
# Server
# ==============================
server.port=8080

# ==============================
# Logging
# ==============================
logging.level.com.tripnest=DEBUG
logging.level.org.springframework.security=INFO
