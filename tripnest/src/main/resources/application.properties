spring.application.name=tripnest

# ==============================
# Database Configuration (MySQL)
# ==============================
spring.datasource.url=jdbc:mysql://localhost:3306/tripnest_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=VSSSM@2006
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ==============================
# JPA / Hibernate
# ==============================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
# Dialect is auto-detected by Hibernate 6 — no need to set explicitly

# Ensure Hibernate creates/updates all tables BEFORE any DataSource initialization runs
spring.jpa.defer-datasource-initialization=true
# Roles are seeded by TripnestApplication CommandLineRunner — no need to run data.sql
spring.sql.init.mode=never

# ==============================
# JWT Configuration
# ==============================
tripnest.app.jwtSecret=TripNestSecretKey2024VeryLongSecretKeyForJWTSigningThatMustBeAtLeast256BitsLong
tripnest.app.jwtExpirationMs=86400000
tripnest.app.jwtCookieName=tripnest

# ==============================
# Server
# ==============================
server.port=8080

# ==============================
# Logging
# ==============================
logging.level.com.tripnest=DEBUG
logging.level.org.springframework.security=INFO
